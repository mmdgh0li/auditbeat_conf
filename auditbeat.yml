auditbeat.modules:
- module: auditd
  resolve_ids: true
  failure_mode: silent
  backlog_limit: 8192
  rate_limit: 0
  include_raw_message: false
  include_warnings: false
  backpressure_strategy: auto
  immutable: false
  audit_rules: |
    -w /usr/bin/qemu -p x -k qemu
    -w /usr/bin/splunk -p x -k splunk
    -w /usr/sbin/splunk -p x -k splunk
    -w /usr/bin/unzip -p x -k Deobfuscate_T1140
    -w /usr/bin/base64 -p x -k Deobfuscate_T1140
    -w /usr/bin/openssl -p x -k Deobfuscate_T1140
    -w /bin/su -p x -k T1169_Sudo
    -w /usr/bin/sudo -p x -k T1169_Sudo
    -w /usr/bin/visudo -p x -k T1169_Sudo
    -w /var/log/audit/ -p wra -k T1562_001_auditlog
    -w /var/audit/ -p wra -k T1562_001_auditlog
    -w /etc/audit/ -p wa -k T1562_001_auditconfig
    -w /etc/libaudit.conf -p wa -k T1562_001_auditconfig
    -w /etc/audisp/ -p wa -k T1562_001_audispconfig
    -a never,user -F subj_type=crond_t
    -a never,exit -F subj_type=crond_t
    -a always,exclude -F msgtype=CRYPTO_KEY_USER
    -a never,exit -F arch=b64 -S all -F exe=/usr/bin/vmtoolsd
    -a never,exit -F arch=b32 -S all -F exe=/usr/bin/vmtoolsd
    -a never,exit -F arch=b32 -F dir=/dev/shm/ -F key=T1559_sharedmemaccess
    -a never,exit -F arch=b64 -F dir=/dev/shm/ -F key=T1559_sharedmemaccess
    -a never,exit -F arch=b32 -F dir=/var/lock/lvm/ -F key=T1562_001_locklvm
    -a never,exit -F arch=b64 -F dir=/var/lock/lvm/ -F key=T1562_001_locklvm
    -a always,exit -F arch=b32 -F dir=/etc/filebeat/ -F perm=wa -F key=T1562_001_filebeat_tamper
    -a always,exit -F arch=b64 -F dir=/etc/filebeat/ -F perm=wa -F key=T1562_001_filebeat_tamper
    -a always,exit -F arch=b32 -F dir=/usr/share/filebeat/ -F perm=wa -F key=T1562_001_filebeat_tamper
    -a always,exit -F arch=b64 -F dir=/usr/share/filebeat/ -F perm=wa -F key=T1562_001_filebeat_tamper
    -w /etc/sysctl.conf -p wa -k T1562_001_kernel_sysctl
